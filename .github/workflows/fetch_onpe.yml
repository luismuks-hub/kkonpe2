name: Fetch ONPE Resultados

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar curl_cffi
        run: pip install curl_cffi

      - name: Consultar API ONPE
        run: |
          python3 << 'PYEOF'
          from curl_cffi import requests
          import json, sys
          from datetime import datetime, timezone

          BASE = 'https://resultadosegundavuelta.onpe.gob.pe/presentacion-backend'
          OPTS = dict(
            headers={
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'es-PE,es;q=0.9',
              'Referer': 'https://resultadosegundavuelta.onpe.gob.pe/main/resumen',
              'Origin':  'https://resultadosegundavuelta.onpe.gob.pe',
            },
            impersonate='chrome124',
            timeout=15
          )

          def get(path):
            r = requests.get(f'{BASE}{path}', **OPTS)
            r.raise_for_status()
            return r.json()

          try:
            # 1. idEleccion
            proc = get('/proceso/proceso-electoral-activo')
            raw  = proc.get('data') or proc
            id_e = raw.get('idEleccion') or raw.get('id') or 1
            print(f'idEleccion: {id_e}')

            # 2. Candidatos y totales
            cands_r = get(f'/candidatos/candidatos-segunda-vuelta?idEleccion={id_e}&tipoFiltro=eleccion')
            tots_r  = get(f'/totales/totales-segunda-vuelta?idEleccion={id_e}&tipoFiltro=eleccion')

            cands = cands_r if isinstance(cands_r, list) else (cands_r.get('data') or [])
            tots  = tots_r  if isinstance(tots_r,  dict) else (tots_r.get('data')  or {})

            # 3. Identificar candidatos por nombre
            keiko = sanchez = None
            for c in cands:
              n = (c.get('nombreCandidato') or '').upper()
              if 'FUJIMORI' in n or 'KEIKO' in n:    keiko   = c
              if 'SANCHEZ'  in n or 'SÁNCHEZ' in n:  sanchez = c

            if not keiko or not sanchez:
              if len(cands) >= 2:
                [sanchez, keiko] = cands[:2]
              else:
                raise ValueError(f'Candidatos no identificados: {json.dumps(cands)[:300]}')

            def pct(c): return float(c.get('porcentajeVotosValidos') or 0)
            def vot(c): return int(c.get('totalVotosValidos') or 0)

            sP=pct(sanchez); sV=vot(sanchez)
            kP=pct(keiko);   kV=vot(keiko)

            resultado = {
              'sanchez': {'nombre': sanchez.get('nombreCandidato','Roberto Sánchez').title(),
                          'partido':'Juntos por el Perú','pct':sP,'votos':sV},
              'keiko':   {'nombre': keiko.get('nombreCandidato','Keiko Fujimori').title(),
                          'partido':'Fuerza Popular','pct':kP,'votos':kV},
              'actasPct':   float(tots.get('actasContabilizadas') or tots.get('porcentajeActas') or 0),
              'totalActas': int(tots.get('totalActas') or tots.get('cantidadActas') or 0),
              'diff':       abs(sV - kV),
              'lider':      'sanchez' if sV >= kV else 'keiko',
              'fuente':     'ONPE API oficial',
              'actualizadoEn': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
            }

            with open('resultados.json','w',encoding='utf-8') as f:
              json.dump(resultado, f, ensure_ascii=False, indent=2)

            print('✅ OK')
            print(json.dumps(resultado, ensure_ascii=False, indent=2))

          except Exception as e:
            print(f'ERROR: {e}', file=sys.stderr)
            import os
            if not os.path.exists('resultados.json'):
              with open('resultados.json','w') as f:
                json.dump({'error':str(e),'actualizadoEn':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')},f)
            sys.exit(0)
          PYEOF

      - name: Commit resultados.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json
          git diff --cached --quiet || git commit -m "data: ONPE $(date -u '+%H:%M UTC')"
          git push
