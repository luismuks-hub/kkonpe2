name: Fetch ONPE Resultados

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar curl_cffi
        run: pip install curl_cffi

      - name: Consultar API ONPE
        run: |
          python3 << 'PYEOF'
          from curl_cffi import requests
          import json, sys
          from datetime import datetime, timezone

          BASE = 'https://resultadosegundavuelta.onpe.gob.pe/presentacion-backend'
          OPTS = dict(
            headers={
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'es-PE,es;q=0.9',
              'Referer': 'https://resultadosegundavuelta.onpe.gob.pe/main/resumen',
              'Origin':  'https://resultadosegundavuelta.onpe.gob.pe',
            },
            impersonate='chrome124',
            timeout=15
          )

          def get(path):
            url = f'{BASE}{path}'
            print(f'>>> GET {url}')
            r = requests.get(url, **OPTS)
            print(f'    Status: {r.status_code} | Inicio: {r.text[:80]}')
            return r

          try:
            # 1. Obtener idEleccion del proceso activo
            r = get('/proceso/proceso-electoral-activo')
            proc = r.json()
            # El log mostró: {"data": {"id": 3, ...}}
            id_e = proc.get('data', {}).get('id') or proc.get('data', {}).get('idEleccion') or 3
            print(f'✅ idEleccion: {id_e}')

            # 2. Candidatos con el id correcto
            rc = get(f'/candidatos/candidatos-segunda-vuelta?idEleccion={id_e}&tipoFiltro=eleccion')
            rt = get(f'/totales/totales-segunda-vuelta?idEleccion={id_e}&tipoFiltro=eleccion')

            if rc.text.strip().startswith('<'):
              raise ValueError(f'Candidatos devolvió HTML con idEleccion={id_e}. La API puede requerir sesión o cambió.')

            cands_raw = rc.json()
            tots_raw  = rt.json() if not rt.text.strip().startswith('<') else {}

            cands = cands_raw if isinstance(cands_raw, list) else (cands_raw.get('data') or [])
            tots  = tots_raw  if isinstance(tots_raw,  dict) else (tots_raw.get('data')  or {})

            print(f'Candidatos recibidos: {len(cands)}')
            for c in cands:
              print(f'  - {c.get("nombreCandidato")} | pct={c.get("porcentajeVotosValidos")} | votos={c.get("totalVotosValidos")}')

            # 3. Identificar por nombre
            keiko = sanchez = None
            for c in cands:
              n = (c.get('nombreCandidato') or '').upper()
              if 'FUJIMORI' in n or 'KEIKO' in n:   keiko   = c
              if 'SANCHEZ'  in n or 'SÁNCHEZ' in n: sanchez = c

            if not keiko or not sanchez:
              if len(cands) >= 2:
                sanchez, keiko = cands[0], cands[1]
                print('⚠ Identificados por posición (no por nombre)')
              else:
                raise ValueError('No se encontraron 2 candidatos')

            sP = float(sanchez.get('porcentajeVotosValidos') or 0)
            sV = int(sanchez.get('totalVotosValidos') or 0)
            kP = float(keiko.get('porcentajeVotosValidos') or 0)
            kV = int(keiko.get('totalVotosValidos') or 0)

            resultado = {
              'sanchez': {
                'nombre':  sanchez.get('nombreCandidato', 'Roberto Sánchez').title(),
                'partido': 'Juntos por el Perú',
                'pct': sP, 'votos': sV
              },
              'keiko': {
                'nombre':  keiko.get('nombreCandidato', 'Keiko Fujimori').title(),
                'partido': 'Fuerza Popular',
                'pct': kP, 'votos': kV
              },
              'actasPct':   float(tots.get('actasContabilizadas') or tots.get('porcentajeActas') or 0),
              'totalActas': int(tots.get('totalActas') or tots.get('cantidadActas') or 0),
              'diff':       abs(sV - kV),
              'lider':      'sanchez' if sV >= kV else 'keiko',
              'fuente':     'ONPE API oficial',
              'actualizadoEn': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
            }

            with open('resultados.json', 'w', encoding='utf-8') as f:
              json.dump(resultado, f, ensure_ascii=False, indent=2)

            print('\n✅ resultados.json actualizado:')
            print(json.dumps(resultado, ensure_ascii=False, indent=2))

          except Exception as e:
            import traceback
            print(f'\n❌ ERROR: {e}')
            traceback.print_exc()
            import os
            if not os.path.exists('resultados.json'):
              with open('resultados.json', 'w') as f:
                json.dump({'error': str(e), 'actualizadoEn': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')}, f)
            sys.exit(0)
          PYEOF

      - name: Commit resultados.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json
          git diff --cached --quiet || git commit -m "data: ONPE $(date -u '+%H:%M UTC')"
          git push
