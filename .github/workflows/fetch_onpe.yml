name: Fetch ONPE Resultados

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install curl_cffi

      - name: Consultar API ONPE
        run: |
          python3 << 'PYEOF'
          from curl_cffi import requests
          import json, sys
          from datetime import datetime, timezone

          FRONTEND = 'https://resultadosegundavuelta.onpe.gob.pe'
          BASE     = f'{FRONTEND}/presentacion-backend'

          HEADERS = {
            'Accept-Language': 'es-PE,es;q=0.9,en;q=0.8',
            'Referer':  f'{FRONTEND}/main/resumen',
            'Origin':    FRONTEND,
          }

          # Usar una sesión para que las cookies se mantengan entre requests
          session = requests.Session()

          def get(url, accept='application/json, text/plain, */*'):
            h = {**HEADERS, 'Accept': accept}
            r = session.get(url, headers=h, impersonate='chrome124', timeout=20)
            print(f'  {r.status_code} | {url[-60:]} | inicio: {r.text[:60].strip()}')
            return r

          try:
            # ── PASO 1: visitar el frontend para obtener cookies de sesión ──
            print('\n[1] Iniciando sesión en el frontend...')
            get(FRONTEND + '/', accept='text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8')
            get(FRONTEND + '/main/resumen', accept='text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8')
            print(f'    Cookies obtenidas: {dict(session.cookies)}')

            # ── PASO 2: obtener idEleccion ──
            print('\n[2] Obteniendo idEleccion...')
            r = get(f'{BASE}/proceso/proceso-electoral-activo')
            proc = r.json()
            id_e = proc.get('data', {}).get('id') or proc.get('data', {}).get('idEleccion') or 3
            print(f'    idEleccion: {id_e}')

            # ── PASO 3: candidatos y totales ──
            print('\n[3] Consultando candidatos y totales...')
            rc = get(f'{BASE}/candidatos/candidatos-segunda-vuelta?idEleccion={id_e}&tipoFiltro=eleccion')
            rt = get(f'{BASE}/totales/totales-segunda-vuelta?idEleccion={id_e}&tipoFiltro=eleccion')

            if rc.text.strip().startswith('<'):
              # Último intento: usar idEleccionPrincipal=10 que también apareció en el log
              print('\n[3b] Intentando con idEleccionPrincipal=10...')
              rc = get(f'{BASE}/candidatos/candidatos-segunda-vuelta?idEleccion=10&tipoFiltro=eleccion')
              rt = get(f'{BASE}/totales/totales-segunda-vuelta?idEleccion=10&tipoFiltro=eleccion')

            if rc.text.strip().startswith('<'):
              raise ValueError('La API sigue devolviendo HTML. ONPE puede haber cerrado el acceso externo.')

            cands_raw = rc.json()
            tots_raw  = rt.json() if rt.text.strip() and not rt.text.strip().startswith('<') else {}

            cands = cands_raw if isinstance(cands_raw, list) else (cands_raw.get('data') or [])
            tots  = tots_raw  if isinstance(tots_raw,  dict) else (tots_raw.get('data')  or {})

            print(f'\n    Candidatos: {len(cands)}')
            for c in cands:
              print(f'      {c.get("nombreCandidato")} | {c.get("porcentajeVotosValidos")}% | {c.get("totalVotosValidos")} votos')

            # ── PASO 4: identificar y guardar ──
            keiko = sanchez = None
            for c in cands:
              n = (c.get('nombreCandidato') or '').upper()
              if 'FUJIMORI' in n or 'KEIKO' in n:   keiko   = c
              if 'SANCHEZ'  in n or 'SÁNCHEZ' in n: sanchez = c

            if not keiko or not sanchez:
              if len(cands) >= 2:
                sanchez, keiko = cands[0], cands[1]

            sP = float(sanchez.get('porcentajeVotosValidos') or 0)
            sV = int(sanchez.get('totalVotosValidos') or 0)
            kP = float(keiko.get('porcentajeVotosValidos') or 0)
            kV = int(keiko.get('totalVotosValidos') or 0)

            resultado = {
              'sanchez': {'nombre': sanchez.get('nombreCandidato','Roberto Sánchez').title(),
                          'partido':'Juntos por el Perú','pct':sP,'votos':sV},
              'keiko':   {'nombre': keiko.get('nombreCandidato','Keiko Fujimori').title(),
                          'partido':'Fuerza Popular','pct':kP,'votos':kV},
              'actasPct':   float(tots.get('actasContabilizadas') or tots.get('porcentajeActas') or 0),
              'totalActas': int(tots.get('totalActas') or tots.get('cantidadActas') or 0),
              'diff':       abs(sV - kV),
              'lider':      'sanchez' if sV >= kV else 'keiko',
              'fuente':     'ONPE API oficial',
              'actualizadoEn': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
            }

            with open('resultados.json','w',encoding='utf-8') as f:
              json.dump(resultado, f, ensure_ascii=False, indent=2)

            print('\n✅ resultados.json guardado:')
            print(json.dumps(resultado, ensure_ascii=False, indent=2))

          except Exception as e:
            import traceback
            print(f'\n❌ ERROR: {e}')
            traceback.print_exc()
            import os
            if not os.path.exists('resultados.json'):
              with open('resultados.json','w') as f:
                json.dump({'error':str(e),'actualizadoEn':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')},f)
            sys.exit(0)
          PYEOF

      - name: Commit resultados.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json
          git diff --cached --quiet || git commit -m "data: ONPE $(date -u '+%H:%M UTC')"
          git push
