name: Fetch ONPE Resultados

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar curl_cffi
        run: pip install curl_cffi

      - name: Consultar API ONPE
        run: |
          python3 << 'PYEOF'
          from curl_cffi import requests
          import json, sys
          from datetime import datetime, timezone

          BASE = 'https://resultadosegundavuelta.onpe.gob.pe/presentacion-backend'
          OPTS = dict(
            headers={
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'es-PE,es;q=0.9',
              'Referer': 'https://resultadosegundavuelta.onpe.gob.pe/main/resumen',
              'Origin':  'https://resultadosegundavuelta.onpe.gob.pe',
            },
            impersonate='chrome124',
            timeout=15
          )

          def get_raw(path):
            url = f'{BASE}{path}'
            print(f'\n>>> GET {url}')
            r = requests.get(url, **OPTS)
            print(f'    Status: {r.status_code}')
            print(f'    Body (primeros 500 chars): {r.text[:500]}')
            return r

          try:
            # DIAGNÓSTICO: ver qué devuelve cada endpoint
            r1 = get_raw('/proceso/proceso-electoral-activo')

            # Intentar con idEleccion=1 directo (sin llamar al proceso)
            r2 = get_raw('/candidatos/candidatos-segunda-vuelta?idEleccion=1&tipoFiltro=eleccion')
            r3 = get_raw('/totales/totales-segunda-vuelta?idEleccion=1&tipoFiltro=eleccion')

            # Si r2 tiene datos, procesar directo
            if r2.status_code == 200 and r2.text.strip() and not r2.text.strip().startswith('<'):
              cands_data = r2.json()
              tots_data  = r3.json() if r3.status_code == 200 else {}

              cands = cands_data if isinstance(cands_data, list) else (cands_data.get('data') or [])
              tots  = tots_data  if isinstance(tots_data,  dict) else (tots_data.get('data')  or {})

              keiko = sanchez = None
              for c in cands:
                n = (c.get('nombreCandidato') or '').upper()
                if 'FUJIMORI' in n or 'KEIKO' in n:   keiko   = c
                if 'SANCHEZ'  in n or 'SÁNCHEZ' in n: sanchez = c

              if not keiko or not sanchez:
                if len(cands) >= 2:
                  sanchez, keiko = cands[0], cands[1]

              if keiko and sanchez:
                sP = float(sanchez.get('porcentajeVotosValidos') or 0)
                sV = int(sanchez.get('totalVotosValidos') or 0)
                kP = float(keiko.get('porcentajeVotosValidos') or 0)
                kV = int(keiko.get('totalVotosValidos') or 0)

                resultado = {
                  'sanchez': {'nombre': sanchez.get('nombreCandidato','Roberto Sánchez').title(),
                              'partido':'Juntos por el Perú','pct':sP,'votos':sV},
                  'keiko':   {'nombre': keiko.get('nombreCandidato','Keiko Fujimori').title(),
                              'partido':'Fuerza Popular','pct':kP,'votos':kV},
                  'actasPct':   float(tots.get('actasContabilizadas') or tots.get('porcentajeActas') or 0),
                  'totalActas': int(tots.get('totalActas') or tots.get('cantidadActas') or 0),
                  'diff':       abs(sV - kV),
                  'lider':      'sanchez' if sV >= kV else 'keiko',
                  'fuente':     'ONPE API oficial',
                  'actualizadoEn': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                }

                with open('resultados.json','w',encoding='utf-8') as f:
                  json.dump(resultado, f, ensure_ascii=False, indent=2)

                print('\n✅ resultados.json actualizado:')
                print(json.dumps(resultado, ensure_ascii=False, indent=2))
              else:
                print('\n⚠ Candidatos no identificados en la respuesta')
            else:
              print('\n⚠ Endpoint de candidatos no retornó JSON válido')

          except Exception as e:
            import traceback
            print(f'\n❌ ERROR: {e}')
            traceback.print_exc()
            sys.exit(0)
          PYEOF

      - name: Commit resultados.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json
          git diff --cached --quiet || git commit -m "data: ONPE $(date -u '+%H:%M UTC')"
          git push
