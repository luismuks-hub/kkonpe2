name: Fetch RPA ONPE

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Extraer datos ONPE con browser real
        run: |
          python3 << 'PYEOF'
          from playwright.sync_api import sync_playwright
          import json, csv, re, os, sys
          from datetime import datetime, timezone

          URL = 'https://resultadosegundavuelta.onpe.gob.pe/main/resumen'

          def now_utc():
            return datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          def limpiar_votos(s):
            return int(re.sub(r"[',.\s]", '', s))

          with sync_playwright() as p:
            print('🚀 Iniciando browser Chromium...')
            browser = p.chromium.launch(
              headless=True,
              args=['--no-sandbox','--disable-dev-shm-usage','--disable-blink-features=AutomationControlled']
            )
            context = browser.new_context(
              locale='es-PE',
              timezone_id='America/Lima',
              user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport={'width': 1280, 'height': 800},
            )
            page = context.new_page()

            try:
              print(f'📡 Navegando a {URL}')
              # Esperar a que la red esté inactiva (Angular terminó de cargar)
              page.goto(URL, wait_until='networkidle', timeout=90000)
              print('✅ Página cargada (networkidle)')

              # Esperar 5 segundos adicionales para que Angular renderice
              page.wait_for_timeout(5000)

              # Screenshot para diagnóstico
              page.screenshot(path='onpe_screenshot.png', full_page=True)
              print('📸 Screenshot guardado')

              # Extraer texto completo del body
              full_text = page.inner_text('body')
              print(f'\n📄 Texto extraído ({len(full_text)} chars)')
              print(f'--- PRIMEROS 1000 CHARS ---')
              print(full_text[:1000])
              print(f'--- FIN PREVIEW ---\n')

              # Si el texto es muy corto, probablemente no cargó
              if len(full_text) < 100:
                print('⚠ Texto muy corto — guardando HTML para debug')
                html = page.content()
                with open('onpe_debug.html', 'w', encoding='utf-8') as f:
                  f.write(html)
                print(f'HTML guardado ({len(html)} chars)')
                browser.close()
                sys.exit(0)

              # ── Timestamp ONPE ──
              onpe_ts = None
              ts_m = re.search(
                r'ACTUALIZADO AL\s+(\d{2}/\d{2}/\d{4})\s+A LAS\s+(\d{1,2}:\d{2}:\d{2}\s*[ap]\.\s*m\.)',
                full_text, re.IGNORECASE
              )
              if ts_m:
                onpe_ts = f"{ts_m.group(1)} {ts_m.group(2).strip()}"
                print(f'🕐 Timestamp ONPE: {onpe_ts}')
              else:
                print('⚠ Timestamp ONPE no encontrado')

              # ── % actas ──
              actas_pct = None
              for pat in [
                r'(\d{1,3}[.,]\d{3})\s*%\s*Actas contabilizadas',
                r'Actas contabilizadas[^\d]*(\d{1,3}[.,]\d{3})',
                r'(\d{2,3}[.,]\d{3})\s*%',
              ]:
                m = re.search(pat, full_text, re.IGNORECASE)
                if m:
                  actas_pct = float(m.group(1).replace(',', '.'))
                  break

              # ── Total actas ──
              total_m = re.search(r'Total de actas[:\s]*([0-9][0-9,.]+)', full_text, re.IGNORECASE)
              actas_total = int(total_m.group(1).replace(',','').replace('.','')) if total_m else None

              # ── Porcentajes candidatos ──
              # Buscar los dos porcentajes XX.XXX% más prominentes en el texto
              todos_pct = re.findall(r'(\d{2}[.,]\d{3})\s*%', full_text)
              pcts_validos = []
              for p in todos_pct:
                v = float(p.replace(',','.'))
                if 40 < v < 60:  # porcentajes electorales razonables
                  pcts_validos.append(v)

              print(f'Porcentajes encontrados (40-60%): {pcts_validos}')

              # Intentar identificar por nombre
              s_pct_m = re.search(r'(?:SANCHEZ|SÁNCHEZ|Sanchez|Sánchez)[^%\d]{0,50}(\d{2}[.,]\d{3})\s*%', full_text, re.IGNORECASE)
              k_pct_m = re.search(r'(?:FUJIMORI|KEIKO|Fujimori|Keiko)[^%\d]{0,50}(\d{2}[.,]\d{3})\s*%', full_text, re.IGNORECASE)

              sanchez_pct = float(s_pct_m.group(1).replace(',','.')) if s_pct_m else (pcts_validos[0] if len(pcts_validos)>=1 else None)
              keiko_pct   = float(k_pct_m.group(1).replace(',','.')) if k_pct_m else (pcts_validos[1] if len(pcts_validos)>=2 else None)

              # ── Votos absolutos ──
              todos_votos = re.findall(r"(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)
              validos_v = []
              for v in todos_votos:
                try:
                  n = limpiar_votos(v)
                  if 5_000_000 < n < 15_000_000:
                    validos_v.append(n)
                except: pass

              print(f'Votos válidos encontrados: {validos_v}')

              s_v_m = re.search(r"(?:SANCHEZ|SÁNCHEZ|Sanchez)[^\d]{0,30}(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)
              k_v_m = re.search(r"(?:FUJIMORI|KEIKO|Fujimori)[^\d]{0,30}(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)

              sanchez_votos = limpiar_votos(s_v_m.group(1)) if s_v_m else (validos_v[0] if len(validos_v)>=1 else None)
              keiko_votos   = limpiar_votos(k_v_m.group(1)) if k_v_m else (validos_v[1] if len(validos_v)>=2 else None)

              print(f'\n📊 Datos extraídos:')
              print(f'   Timestamp ONPE : {onpe_ts}')
              print(f'   Actas          : {actas_pct}% de {actas_total}')
              print(f'   Sánchez        : {sanchez_pct}% | {sanchez_votos} votos')
              print(f'   Keiko          : {keiko_pct}% | {keiko_votos} votos')

              if not sanchez_pct and not keiko_pct:
                print('\n⚠ No se encontraron datos. Guardando HTML completo para debug...')
                with open('onpe_debug.html','w',encoding='utf-8') as f:
                  f.write(page.content())
                print('onpe_debug.html guardado — revisa ese archivo en el repo')
                browser.close()
                sys.exit(0)

              diff  = abs(sanchez_votos - keiko_votos) if sanchez_votos and keiko_votos else None
              lider = 'sanchez' if (sanchez_votos or sanchez_pct or 0) >= (keiko_votos or keiko_pct or 0) else 'keiko'
              ts    = now_utc()

              resultado = {
                'sanchez':    {'nombre':'Roberto Helbert Sanchez Palomino','partido':'Juntos por el Perú','pct':sanchez_pct,'votos':sanchez_votos},
                'keiko':      {'nombre':'Keiko Sofia Fujimori Higuchi',    'partido':'Fuerza Popular',    'pct':keiko_pct,  'votos':keiko_votos},
                'actasPct':   actas_pct,
                'totalActas': actas_total,
                'diff':       diff,
                'lider':      lider,
                'onpeTs':     onpe_ts,
                'fuente':     'ONPE web (Playwright RPA)',
                'actualizadoEn': ts,
              }

              with open('resultados.json','w',encoding='utf-8') as f:
                json.dump(resultado, f, ensure_ascii=False, indent=2)

              csv_path = 'historial.csv'
              nuevo = not os.path.exists(csv_path)
              with open(csv_path,'a',newline='',encoding='utf-8') as f:
                w = csv.writer(f)
                if nuevo:
                  w.writerow(['timestamp_utc','onpe_actualizado_al','actasPct','totalActas',
                              'sanchez_pct','sanchez_votos','keiko_pct','keiko_votos','diferencia','lider'])
                w.writerow([ts, onpe_ts, actas_pct, actas_total,
                            sanchez_pct, sanchez_votos, keiko_pct, keiko_votos, diff, lider])

              print('\n✅ resultados.json y historial.csv actualizados')
              print(json.dumps(resultado, ensure_ascii=False, indent=2))

            except Exception as e:
              import traceback
              print(f'\n❌ ERROR: {e}')
              traceback.print_exc()
              try:
                page.screenshot(path='onpe_error.png', full_page=True)
                with open('onpe_debug.html','w',encoding='utf-8') as f:
                  f.write(page.content())
                print('onpe_error.png y onpe_debug.html guardados para debug')
              except: pass
            finally:
              browser.close()
          PYEOF

      - name: Commit resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Forzar que historial.csv siempre exista en el repo
          git add -f resultados.json historial.csv onpe_screenshot.png 2>/dev/null || true
          git add onpe_error.png onpe_debug.html 2>/dev/null || true
          # Commit si hay cualquier cambio staged
          if ! git diff --cached --quiet; then
            git commit -m "data: RPA ONPE $(date -u '+%H:%M UTC')"
            git push
          else
            echo "Sin cambios en datos — ONPE no actualizó desde el último run"
          fi
