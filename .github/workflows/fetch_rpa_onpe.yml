name: Fetch RPA ONPE

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Extraer datos ONPE con browser real
        run: |
          python3 << 'PYEOF'
          from playwright.sync_api import sync_playwright
          import json, csv, re, os, sys
          from datetime import datetime, timezone

          URL = 'https://resultadosegundavuelta.onpe.gob.pe/main/resumen'

          def now_utc():
            return datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          def limpiar_votos(s):
            return int(re.sub(r"[',.\s]", '', s))

          with sync_playwright() as p:
            print('🚀 Iniciando browser Chromium...')
            browser = p.chromium.launch(
              headless=True,
              args=['--no-sandbox', '--disable-dev-shm-usage']
            )
            context = browser.new_context(
              locale='es-PE',
              timezone_id='America/Lima',
              user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport={'width': 1280, 'height': 800},
            )
            page = context.new_page()

            try:
              print(f'📡 Navegando a {URL}')
              page.goto(URL, wait_until='networkidle', timeout=60000)

              print('⏳ Esperando que carguen los datos...')
              page.wait_for_selector('text=%', timeout=30000)

              page.screenshot(path='onpe_screenshot.png')
              full_text = page.inner_text('body')
              print(f'\n📄 Texto extraído (primeros 800 chars):\n{full_text[:800]}')

              # ── Fecha y hora de actualización de ONPE ──
              # Patrón: "ACTUALIZADO AL 09/06/2026 A LAS 09:28:00 p. m."
              onpe_ts = None
              ts_m = re.search(
                r'ACTUALIZADO AL\s+(\d{2}/\d{2}/\d{4})\s+A LAS\s+(\d{1,2}:\d{2}:\d{2}\s*[ap]\.\s*m\.)',
                full_text, re.IGNORECASE
              )
              if ts_m:
                onpe_ts = f"{ts_m.group(1)} {ts_m.group(2).strip()}"
                print(f'🕐 Timestamp ONPE: {onpe_ts}')
              else:
                print('⚠ No se encontró timestamp de ONPE')

              # ── % actas contabilizadas ──
              actas_m = re.search(r'(\d{1,3}[.,]\d{3})\s*%\s*Actas contabilizadas', full_text, re.IGNORECASE)
              if not actas_m:
                actas_m = re.search(r'Actas contabilizadas[^\d]*(\d{1,3}[.,]\d{3})', full_text, re.IGNORECASE)
              actas_pct = float(actas_m.group(1).replace(',', '.')) if actas_m else None

              # ── Total actas ──
              total_m = re.search(r'Total de actas[:\s]*([0-9][0-9,.]+)', full_text, re.IGNORECASE)
              actas_total = int(total_m.group(1).replace(',','').replace('.','')) if total_m else None

              # ── Porcentajes candidatos ──
              s_pct_m = re.search(r'(?:SANCHEZ|SÁNCHEZ)[^%\d]*(\d{2}[.,]\d{3})\s*%', full_text, re.IGNORECASE)
              if not s_pct_m:
                s_pct_m = re.search(r'(\d{2}[.,]\d{3})\s*%[^%]*(?:SANCHEZ|SÁNCHEZ)', full_text, re.IGNORECASE)
              k_pct_m = re.search(r'(?:FUJIMORI|KEIKO)[^%\d]*(\d{2}[.,]\d{3})\s*%', full_text, re.IGNORECASE)
              if not k_pct_m:
                k_pct_m = re.search(r'(\d{2}[.,]\d{3})\s*%[^%]*(?:FUJIMORI|KEIKO)', full_text, re.IGNORECASE)

              sanchez_pct = float(s_pct_m.group(1).replace(',','.')) if s_pct_m else None
              keiko_pct   = float(k_pct_m.group(1).replace(',','.')) if k_pct_m else None

              # ── Votos absolutos ──
              s_v_m = re.search(r"(?:SANCHEZ|SÁNCHEZ)[^\d]*(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)
              k_v_m = re.search(r"(?:FUJIMORI|KEIKO)[^\d]*(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)

              if not s_v_m or not k_v_m:
                todos = re.findall(r"(\d[\d',.]{6,11})\s*votos", full_text)
                validos = [limpiar_votos(v) for v in todos if 5_000_000 < limpiar_votos(v) < 15_000_000]
                sanchez_votos = validos[0] if len(validos) > 0 else None
                keiko_votos   = validos[1] if len(validos) > 1 else None
              else:
                sanchez_votos = limpiar_votos(s_v_m.group(1))
                keiko_votos   = limpiar_votos(k_v_m.group(1))

              print(f'\n📊 Datos extraídos:')
              print(f'   Timestamp ONPE : {onpe_ts}')
              print(f'   Actas          : {actas_pct}% de {actas_total}')
              print(f'   Sánchez        : {sanchez_pct}% | {sanchez_votos} votos')
              print(f'   Keiko          : {keiko_pct}% | {keiko_votos} votos')

              if not sanchez_pct and not keiko_pct:
                print('\n⚠ Sin datos en el DOM. Texto completo:')
                print(full_text[:3000])
                browser.close()
                sys.exit(0)

              diff  = abs(sanchez_votos - keiko_votos) if sanchez_votos and keiko_votos else None
              lider = 'sanchez' if (sanchez_votos or 0) >= (keiko_votos or 0) else 'keiko'
              ts    = now_utc()

              # ── JSON ──
              resultado = {
                'sanchez':    {'nombre':'Roberto Helbert Sanchez Palomino','partido':'Juntos por el Perú','pct':sanchez_pct,'votos':sanchez_votos},
                'keiko':      {'nombre':'Keiko Sofia Fujimori Higuchi',    'partido':'Fuerza Popular',    'pct':keiko_pct,  'votos':keiko_votos},
                'actasPct':   actas_pct,
                'totalActas': actas_total,
                'diff':       diff,
                'lider':      lider,
                'onpeTs':     onpe_ts,
                'fuente':     'ONPE web (Playwright RPA)',
                'actualizadoEn': ts,
              }
              with open('resultados.json','w',encoding='utf-8') as f:
                json.dump(resultado, f, ensure_ascii=False, indent=2)

              # ── CSV historial ──
              csv_path = 'historial.csv'
              nuevo = not os.path.exists(csv_path)
              with open(csv_path,'a',newline='',encoding='utf-8') as f:
                w = csv.writer(f)
                if nuevo:
                  w.writerow(['timestamp_utc','onpe_actualizado_al','actasPct','totalActas',
                              'sanchez_pct','sanchez_votos','keiko_pct','keiko_votos','diferencia','lider'])
                w.writerow([ts, onpe_ts, actas_pct, actas_total,
                            sanchez_pct, sanchez_votos, keiko_pct, keiko_votos, diff, lider])

              print('\n✅ resultados.json y historial.csv actualizados')
              print(json.dumps(resultado, ensure_ascii=False, indent=2))

            except Exception as e:
              import traceback
              print(f'\n❌ ERROR: {e}')
              traceback.print_exc()
              try: page.screenshot(path='onpe_error.png')
              except: pass
            finally:
              browser.close()
          PYEOF

      - name: Commit resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json historial.csv onpe_screenshot.png || true
          git diff --cached --quiet || git commit -m "data: RPA ONPE $(date -u '+%H:%M UTC')"
          git push
