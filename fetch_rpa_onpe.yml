name: Fetch RPA ONPE

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Extraer datos ONPE con browser real
        run: |
          python3 << 'PYEOF'
          from playwright.sync_api import sync_playwright
          from html.parser import HTMLParser
          import json, csv, re, os, sys
          from datetime import datetime, timezone

          URL = 'https://resultadosegundavuelta.onpe.gob.pe/main/resumen'

          def now_utc():
            return datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          def limpiar_votos(s):
            return int(re.sub(r"[',.\s]", '', s))

          class TextExtractor(HTMLParser):
            def __init__(self):
              super().__init__()
              self.texts = []
              self.skip = False
            def handle_starttag(self, tag, attrs):
              if tag in ('script','style','head','noscript'): self.skip = True
            def handle_endtag(self, tag):
              if tag in ('script','style','head','noscript'): self.skip = False
            def handle_data(self, data):
              if not self.skip and data.strip():
                self.texts.append(data.strip())

          def html_to_text(html):
            p = TextExtractor()
            p.feed(html)
            return '\n'.join(p.texts)

          with sync_playwright() as pw:
            print('🚀 Iniciando Chromium...')
            browser = pw.chromium.launch(
              headless=True,
              args=['--no-sandbox','--disable-dev-shm-usage']
            )
            context = browser.new_context(
              locale='es-PE',
              timezone_id='America/Lima',
              user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport={'width':1280,'height':800},
            )
            page = context.new_page()

            try:
              print(f'📡 Cargando {URL}')
              page.goto(URL, wait_until='networkidle', timeout=90000)
              print('✅ networkidle OK')

              # Esperar más tiempo para Angular
              page.wait_for_timeout(8000)

              # Screenshot siempre
              page.screenshot(path='onpe_screenshot.png', full_page=True)
              print('📸 Screenshot guardado')

              # ── MÉTODO 1: inner_text ──
              t1 = page.inner_text('body')
              print(f'[M1] inner_text: {len(t1)} chars')

              # ── MÉTODO 2: textContent via JS ──
              t2 = page.evaluate("document.body.innerText || ''")
              print(f'[M2] JS innerText: {len(t2)} chars')

              # ── MÉTODO 3: HTML parseado ──
              html = page.content()
              t3 = html_to_text(html)
              print(f'[M3] HTML parseado: {len(t3)} chars')

              # Siempre guardar debug
              with open('onpe_debug.html','w',encoding='utf-8') as f:
                f.write(html)
              print(f'💾 onpe_debug.html guardado ({len(html)} chars)')

              # Usar el método que más texto dio
              full_text = max([t1, t2, t3], key=len)
              metodo = ['inner_text','JS innerText','HTML parseado'][[t1,t2,t3].index(full_text)]
              print(f'✅ Usando método: {metodo} ({len(full_text)} chars)')

              print(f'\n--- PRIMEROS 800 CHARS ---')
              print(full_text[:800])
              print(f'--- FIN ---\n')

              if len(full_text) < 50:
                print('❌ Sin contenido útil en ningún método')
                browser.close()
                sys.exit(0)

              # ── Timestamp ONPE ──
              ts_m = re.search(
                r'ACTUALIZADO AL\s+(\d{2}/\d{2}/\d{4})\s+A LAS\s+(\d{1,2}:\d{2}:\d{2}\s*[ap]\.\s*m\.)',
                full_text, re.IGNORECASE
              )
              onpe_ts = f"{ts_m.group(1)} {ts_m.group(2).strip()}" if ts_m else None
              print(f'🕐 Timestamp ONPE: {onpe_ts}')

              # ── % actas ──
              actas_pct = None
              for pat in [
                r'(\d{1,3}[.,]\d{3})\s*%\s*Actas contabilizadas',
                r'Actas contabilizadas[^\d]*(\d{1,3}[.,]\d{3})',
                r'(\d{2,3}[.,]\d{3})\s*%',
              ]:
                m = re.search(pat, full_text, re.IGNORECASE)
                if m:
                  actas_pct = float(m.group(1).replace(',','.'))
                  break

              # ── Total actas ──
              total_m = re.search(r'Total de actas[:\s]*([0-9][0-9,.]+)', full_text, re.IGNORECASE)
              actas_total = int(total_m.group(1).replace(',','').replace('.','')) if total_m else None

              # ── Porcentajes ──
              todos_pct = re.findall(r'(\d{2}[.,]\d{3})\s*%', full_text)
              pcts = [float(p.replace(',','.')) for p in todos_pct if 40 < float(p.replace(',','.')) < 60]
              print(f'Porcentajes 40-60%: {pcts}')

              s_pct_m = re.search(r'(?:SANCHEZ|SÁNCHEZ|Sanchez|Sánchez)[^%\d]{0,80}(\d{2}[.,]\d{3})\s*%', full_text, re.IGNORECASE)
              k_pct_m = re.search(r'(?:FUJIMORI|KEIKO|Fujimori|Keiko)[^%\d]{0,80}(\d{2}[.,]\d{3})\s*%', full_text, re.IGNORECASE)
              sanchez_pct = float(s_pct_m.group(1).replace(',','.')) if s_pct_m else (pcts[0] if len(pcts)>=1 else None)
              keiko_pct   = float(k_pct_m.group(1).replace(',','.')) if k_pct_m else (pcts[1] if len(pcts)>=2 else None)

              # ── Votos ──
              todos_v = re.findall(r"(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)
              validos_v = []
              for v in todos_v:
                try:
                  n = limpiar_votos(v)
                  if 5_000_000 < n < 15_000_000: validos_v.append(n)
                except: pass
              print(f'Votos válidos: {validos_v}')

              s_v_m = re.search(r"(?:SANCHEZ|SÁNCHEZ|Sanchez)[^\d]{0,50}(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)
              k_v_m = re.search(r"(?:FUJIMORI|KEIKO|Fujimori)[^\d]{0,50}(\d[\d',.]{6,11})\s*votos", full_text, re.IGNORECASE)
              sanchez_votos = limpiar_votos(s_v_m.group(1)) if s_v_m else (validos_v[0] if validos_v else None)
              keiko_votos   = limpiar_votos(k_v_m.group(1)) if k_v_m else (validos_v[1] if len(validos_v)>1 else None)

              print(f'\n📊 Resultado:')
              print(f'   ONPE ts   : {onpe_ts}')
              print(f'   Actas     : {actas_pct}% de {actas_total}')
              print(f'   Sánchez   : {sanchez_pct}% | {sanchez_votos} votos')
              print(f'   Keiko     : {keiko_pct}% | {keiko_votos} votos')

              if not sanchez_pct and not keiko_pct:
                print('⚠ Sin datos de candidatos — revisar onpe_debug.html en el repo')
                browser.close()
                sys.exit(0)

              diff  = abs(sanchez_votos - keiko_votos) if sanchez_votos and keiko_votos else None
              lider = 'sanchez' if (sanchez_votos or sanchez_pct or 0) >= (keiko_votos or keiko_pct or 0) else 'keiko'
              ts    = now_utc()

              resultado = {
                'sanchez':    {'nombre':'Roberto Helbert Sanchez Palomino','partido':'Juntos por el Perú','pct':sanchez_pct,'votos':sanchez_votos},
                'keiko':      {'nombre':'Keiko Sofia Fujimori Higuchi',    'partido':'Fuerza Popular',    'pct':keiko_pct,  'votos':keiko_votos},
                'actasPct':   actas_pct,
                'totalActas': actas_total,
                'diff':       diff,
                'lider':      lider,
                'onpeTs':     onpe_ts,
                'fuente':     'ONPE web (Playwright RPA)',
                'actualizadoEn': ts,
              }

              with open('resultados.json','w',encoding='utf-8') as f:
                json.dump(resultado, f, ensure_ascii=False, indent=2)

              csv_path = 'historial.csv'
              nuevo = not os.path.exists(csv_path)
              with open(csv_path,'a',newline='',encoding='utf-8') as f:
                w = csv.writer(f)
                if nuevo:
                  w.writerow(['timestamp_utc','onpe_actualizado_al','actasPct','totalActas',
                              'sanchez_pct','sanchez_votos','keiko_pct','keiko_votos','diferencia','lider'])
                w.writerow([ts, onpe_ts, actas_pct, actas_total,
                            sanchez_pct, sanchez_votos, keiko_pct, keiko_votos, diff, lider])

              print('\n✅ resultados.json y historial.csv actualizados')
              print(json.dumps(resultado, ensure_ascii=False, indent=2))

            except Exception as e:
              import traceback
              print(f'\n❌ ERROR: {e}')
              traceback.print_exc()
              try:
                page.screenshot(path='onpe_error.png', full_page=True)
                with open('onpe_debug.html','w',encoding='utf-8') as f:
                  f.write(page.content())
              except: pass
            finally:
              browser.close()
          PYEOF

      - name: Commit resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f resultados.json historial.csv onpe_screenshot.png onpe_debug.html 2>/dev/null || true
          git add onpe_error.png 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "data: RPA ONPE $(date -u '+%H:%M UTC')"
            git push
          else
            echo "Sin cambios en datos — ONPE no actualizó desde el último run"
          fi
